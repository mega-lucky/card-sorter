<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .grid {
            display: grid;
            grid-template-rows: repeat(4, 1fr);
            gap: 0.25em;
            pointer-events: none;
        }
        .card {
            aspect-ratio: 3 / 4;
            border: 2px solid #44444a;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            background-color: white;
            width: 4em;
        }
    </style>
    <meta charset="UTF-8">
    <title>Sorting Cards</title>
</head>
<body>
    <button id="start-button">Start</button>
    <span id="time-indicator">Elapsed: 00:00.00</span>
    <div class="grid" id="grid"></div>
    <footer style="color: red; font-style: italic;">
        <p>Note: this only works on mobile with touch controls</p>
    </footer>
    <script>
        const grid = document.getElementById("grid");
        const startButton = document.getElementById("start-button");
        const timeIndicator = document.getElementById("time-indicator");
        
        var sorted;
        var cardsArray;
        var gameActive = false;
        var startTime;
                
        const swapElements = function(obj1, obj2) {
            const temp = document.createElement("div");
            obj1.parentNode.insertBefore(temp, obj1);
            obj2.parentNode.insertBefore(obj1, obj2);
            temp.parentNode.insertBefore(obj2, temp);
            temp.parentNode.removeChild(temp);
        }
        const swapCardArrayItems = function(index1, index2) {
            [cardsArray[index1], cardsArray[index2]] = [cardsArray[index2], cardsArray[index1]];
        }
        const arraysEqual = function(arr1, arr2) {
            if (arr1.length !== arr2.length) return false;
            return arr1.every((value, index) => value === arr2[index]);
        };
        
        const getOverlappingElement = function(target) {
            const boundingBox = target.getBoundingClientRect();
            boundingBox.x += offset[0];
            boundingBox.y += offset[1];
            boundingBox.left += offset[0];
            boundingBox.right += offset[0];
            boundingBox.top += offset[1];
            boundingBox.bottom += offset[1];
            
            let overlappingElement;
            let smallestDistance = Infinity;
            for (element of cardsArray) {
                if (element === target) { continue; }
                const elRect = element.getBoundingClientRect();

                const overlap =
                    elRect.bottom > boundingBox.top &&
                    elRect.top < boundingBox.bottom &&
                    elRect.right > boundingBox.left &&
                    elRect.left < boundingBox.right;
                
                if (!overlap) { continue; }
                
                let distance = Math.sqrt(
                    Math.pow(boundingBox.x-elRect.x, 2) +
                    Math.pow(boundingBox.y-elRect.y, 2)
                );
                if (distance < smallestDistance) {
                    smallestDistance = distance;
                    overlappingElement = element;
                }
            }
            
            return overlappingElement;
        }
        
        const updateTimer = function() {
            if (!startTime || !gameActive) { return; }
            
            const now = Date.now();
            const elapsed = now - startTime;
            
            const mins = Math.floor(elapsed / 60000);
            const secs = Math.floor((elapsed % 60000) / 1000);
            const ms = Math.floor(elapsed % 1000);
            
            timeIndicator.innerText = `Elapsed: ${mins}:${secs < 10 ? "0"+secs : secs}.${ms}`;
            
            requestAnimationFrame(updateTimer);
        }
        
        const startGame = function() {
            if (gameActive) { return; }
            
            const cardsCount = 52;
            startTime = Date.now();
            
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${Math.floor(cardsCount / 4)}, auto)`;
            cardsArray = Array(cardsCount);
            
            for (let i = 0; i < cardsCount; i ++) {
                const suitIndex = Math.floor(i / (cardsCount / 4));
                const suitText = suitIndex === 0 ? '♣️' :
                    suitIndex === 1 ? '♠️' :
                    suitIndex === 2 ? '♥️' :
                    '♦️';
                
                const valueIndex = i % Math.floor(cardsCount / 4);
                const value = valueIndex === 0 ? 'A':
                    valueIndex === 10 ? 'J' :
                    valueIndex === 11 ? 'Q' :
                    valueIndex === 12 ? 'K' :
                    valueIndex + 1;
                
                const card = document.createElement("div");
                card.setAttribute("draggable", "true");
                card.setAttribute("data-value", i);
                card.className = "card selected";
                card.innerText = value + suitText;
            
                let index = Math.floor(Math.random() * cardsCount);
                while (cardsArray[index] !== undefined) {
                    index = Math.floor(Math.random() * cardsCount);
                }
                cardsArray[index] = card;
                card.setAttribute("data-index", index);
            }
            grid.append(...cardsArray);
            sorted = [...cardsArray].sort((a, b) => {
                return a.getAttribute("data-value") - b.getAttribute("data-value");
            });
            
            gameActive = true;
            updateTimer();
        }
        const endGame = function() {
            gameActive = false;
            sorted = undefined;
            cardsArray = undefined;
            startTime = undefined;
        }
        
        var offset = [0,0];
        var touchLocation;
        grid.addEventListener('touchmove', function(e) {
            if (!gameActive) { return; }
            
            if (e.cancelable) {
                e.preventDefault();
            } else {
                return;
            }
            const target = e.target;
        
            const deltaX = touchLocation ? e.targetTouches[0].pageX - touchLocation.pageX : 0;
            const deltaY = touchLocation ? e.targetTouches[0].pageY - touchLocation.pageY : 0;
            offset[0] += deltaX;
            offset[1] += deltaY;
            touchLocation = e.targetTouches[0]; 

            target.style.position = "relative";
            target.style.left = offset[0] + 'px';
            target.style.top = offset[1] + 'px';
            target.style.pointerEvents = "none";
        });
        grid.addEventListener('touchend', function(e) {
            if (!gameActive) { return; }
            const target = event.target;
            target.style.position = "";
            target.style.pointerEvents = "";
            if (!touchLocation) {
                return;
            }
            const dropElement = getOverlappingElement(target);
            
            touchLocation = undefined;
            offset = [0,0];
            
            target.style.position = "";
            target.style.pointerEvents = "";
            
            if (!dropElement || ![...grid.children].includes(dropElement)) {
                return;
            }
            
            const targetIndex = target.getAttribute("data-index");
            const dropIndex = dropElement.getAttribute("data-index");
            
            swapElements(dropElement, target);
            swapCardArrayItems(targetIndex, dropIndex);
            
            target.setAttribute("data-index", dropIndex);
            dropElement.setAttribute("data-index", targetIndex);
            
            if (arraysEqual(cardsArray, sorted)) {
                endGame();
                alert("You win!!");
            }
        });
        
        startButton.addEventListener("click", () => {
            if (!gameActive) {
                startGame();
            } else {
                endGame();
            }
        });
    </script>
</body>
</html>
